version: "3.7"

services:

  app_proxy:
    environment:
      APP_HOST: lerix-nanoclaw_server_1
      APP_PORT: 7681

  server:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ANTHROPIC_API_KEY: ${APP_NANOCLAW_ANTHROPIC_API_KEY:-}
      CLAUDE_CODE_OAUTH_TOKEN: ${APP_NANOCLAW_CLAUDE_CODE_OAUTH_TOKEN:-}
      ASSISTANT_NAME: ${APP_NANOCLAW_ASSISTANT_NAME:-Andy}
      TZ: UTC
    volumes:
      - "${APP_DATA_DIR}/data:/app/data"
      - "${APP_DATA_DIR}/store:/app/store"
      - "${APP_DATA_DIR}/groups:/app/groups"
      - /var/run/docker.sock:/var/run/docker.sock
