services:

  app_proxy:
    environment:
      APP_HOST: lerix-nanoclaw_server_1
      APP_PORT: 7681

  server:
    image: node:22
    restart: unless-stopped
    command:
      - bash
      - -c
      - |
        echo "=== NanoClaw starting ==="

        # Install ttyd
        if [ ! -f /usr/local/bin/ttyd ]; then
          ARCH=$$(dpkg --print-architecture)
          if [ "$$ARCH" = "arm64" ]; then
            curl -fSL "https://github.com/tsl0922/ttyd/releases/latest/download/ttyd.aarch64" -o /usr/local/bin/ttyd
          else
            curl -fSL "https://github.com/tsl0922/ttyd/releases/latest/download/ttyd.x86_64" -o /usr/local/bin/ttyd
          fi
          chmod +x /usr/local/bin/ttyd
        fi

        # Clone and build NanoClaw on first run
        if [ ! -f /data/nanoclaw/dist/index.js ]; then
          echo "First run: cloning NanoClaw..."
          git clone --depth 1 https://github.com/qwibitai/NanoClaw.git /data/nanoclaw
          cd /data/nanoclaw
          npm ci
          npm run build
        fi

        cd /data/nanoclaw

        # Write .env
        echo "ANTHROPIC_API_KEY=$$ANTHROPIC_API_KEY" > .env
        echo "CLAUDE_CODE_OAUTH_TOKEN=$$CLAUDE_CODE_OAUTH_TOKEN" >> .env
        echo "ASSISTANT_NAME=$${ASSISTANT_NAME:-Andy}" >> .env
        echo "CONTAINER_IMAGE=nanoclaw-agent:latest" >> .env
        echo "TZ=$${TZ:-UTC}" >> .env

        echo "=== Starting NanoClaw via ttyd on port 7681 ==="
        exec ttyd --port 7681 --writable node /data/nanoclaw/dist/index.js
    environment:
      ANTHROPIC_API_KEY: ${APP_NANOCLAW_ANTHROPIC_API_KEY:-}
      CLAUDE_CODE_OAUTH_TOKEN: ${APP_NANOCLAW_CLAUDE_CODE_OAUTH_TOKEN:-}
      ASSISTANT_NAME: ${APP_NANOCLAW_ASSISTANT_NAME:-Andy}
      TZ: UTC
    volumes:
      - "${APP_DATA_DIR}/data:/data"
      - /var/run/docker.sock:/var/run/docker.sock
